<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Optimizado TV & Web</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0b0b;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .player-box {
            max-width: 800px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            background: #000;
            border-radius: 6px;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        select {
            background: #222;
            color: #fff;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .info-tag {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="player-box">
        <h2>Fox 4K Player</h2>
        <video id="video" controls autoplay playsinline muted></video>

        <div class="controls">
            <div>
                <label>Calidad:</label>
                <select id="qualitySelect" disabled>
                    <option>Detectando...</option>
                </select>
            </div>
            <div>
                <label>Audio:</label>
                <select id="audioSelect" disabled>
                    <option>Detectando...</option>
                </select>
            </div>
        </div>
        <div id="modeInfo" class="info-tag"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySelect = document.getElementById('qualitySelect');
        const audioSelect = document.getElementById('audioSelect');
        const modeInfo = document.getElementById('modeInfo');

        const streamUrl = 'https://nl-081-v1.vivocdn.xyz/1781474995/c075a3b56e6144ef9ab2638dea205f34/qHwDja898rB6sB4eV3OmDdj4IfndP_vZIg7ezk8CVWw/fox4k-usa.m3u8';

        // DETECCIÓN CRÍTICA: ¿Es una Smart TV o dispositivo similar?
        const ua = navigator.userAgent.toLowerCase();
        const isSmartTV = ua.includes("tizen") || ua.includes("smarttv") || ua.includes("googletv") || ua.includes("appletv") || ua.includes("lgbrowser");

        // EJECUCIÓN SEGÚN EL ENTORNO
        if (isSmartTV) {
            // MODO TV: Máxima estabilidad, decodificación por hardware nativa para evitar congelamientos
            modeInfo.innerText = "Modo: Smart TV (Reproducción Nativa por Hardware)";
            video.src = streamUrl;

            video.addEventListener('loadedmetadata', () => {
                // En TV, el sistema adapta la calidad automáticamente (ABR) para evitar cortes
                qualitySelect.innerHTML = '<option>Automático (Optimizado por TV)</option>';

                // Intentar leer audios nativos si la TV los expone
                if (video.audioTracks && video.audioTracks.length > 1) {
                    audioSelect.disabled = false;
                    audioSelect.innerHTML = '';
                    for (let i = 0; i < video.audioTracks.length; i++) {
                        let track = video.audioTracks[i];
                        let opt = document.createElement('option');
                        opt.value = i;
                        opt.text = track.label || track.language || `Audio ${i + 1}`;
                        if (track.enabled) opt.selected = true;
                        audioSelect.appendChild(opt);
                    }
                    audioSelect.addEventListener('change', (e) => {
                        for (let i = 0; i < video.audioTracks.length; i++) {
                            video.audioTracks[i].enabled = (i == e.target.value);
                        }
                    });
                } else {
                    audioSelect.innerHTML = '<option>Por defecto de la señal</option>';
                }
            });

        } else if (Hls.isSupported()) {
            // MODO WEB: Navegadores de PC/Móviles donde JS sí tiene potencia para procesar
            modeInfo.innerText = "Modo: Web Estándar (Hls.js)";
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                // Configurar Calidades en PC
                qualitySelect.disabled = false;
                qualitySelect.innerHTML = '<option value="-1">Automático</option>';
                hls.levels.forEach((lvl, idx) => {
                    let opt = document.createElement('option');
                    opt.value = idx;
                    opt.text = lvl.name || `${lvl.height}p`;
                    qualitySelect.appendChild(opt);
                });
                qualitySelect.addEventListener('change', (e) => { hls.currentLevel = parseInt(e.target.value); });

                // Configurar Audios en PC
                if (hls.audioTracks.length > 1) {
                    audioSelect.disabled = false;
                    audioSelect.innerHTML = '';
                    hls.audioTracks.forEach((track, idx) => {
                        let opt = document.createElement('option');
                        opt.value = idx;
                        opt.text = track.name || `Audio ${idx + 1}`;
                        if (idx === hls.audioTrack) opt.selected = true;
                        audioSelect.appendChild(opt);
                    });
                    audioSelect.addEventListener('change', (e) => { hls.audioTrack = parseInt(e.target.value); });
                } else {
                    audioSelect.innerHTML = '<option>Audio Único</option>';
                }
            });
        } else {
            // Fallback genérico para Safari básico
            video.src = streamUrl;
        }
    </script>

</body>

</html>
