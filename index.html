<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor TV & Web (CORS Patch)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .player-container {
            max-width: 800px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            background: #000;
            border-radius: 8px;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        select {
            background: #222;
            color: #fff;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
        }

        #debugLog {
            margin-top: 20px;
            padding: 10px;
            background: #1a1a1a;
            color: #00ff00;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

    <div class="player-container">
        <h2>Fox 4K Player (Bypass CORS Activo)</h2>
        <video id="video" controls autoplay playsinline muted></video>

        <div class="controls">
            <div>
                <label>Calidad:</label><br>
                <select id="qualitySelect" disabled>
                    <option>Esperando señal...</option>
                </select>
            </div>
            <div>
                <label>Audio:</label><br>
                <select id="audioSelect" disabled>
                    <option>Esperando señal...</option>
                </select>
            </div>
        </div>

        <div id="debugLog">Iniciando sistema...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySelect = document.getElementById('qualitySelect');
        const audioSelect = document.getElementById('audioSelect');
        const debugLog = document.getElementById('debugLog');

        function log(msg, isError = false) {
            const color = isError ? "#ff4444" : "#00ff00";
            debugLog.innerHTML += `<br><span style="color: ${color}">> ${msg}</span>`;
            console.log(msg);
        }

        // URL Original de tu streaming
        const urlOriginal = 'https://nl-081-v1.vivocdn.xyz/1781474995/c075a3b56e6144ef9ab2638dea205f34/qHwDja898rB6sB4eV3OmDdj4IfndP_vZIg7ezk8CVWw/fox4k-usa.m3u8';

        // PARCHE: Pasamos la URL a través de un proxy inverso para romper el bloqueo CORS de la TV
        const streamUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(urlOriginal);

        if (Hls.isSupported()) {
            log("Hls.js cargado. Solicitando video mediante Proxy CORS...");

            const hlsConfig = {
                enableWorker: true,
                maxBufferLength: 10,
                maxMaxBufferLength: 15,
                maxBufferSize: 15 * 1024 * 1024,
                lowLatencyMode: false
            };

            const hls = new Hls(hlsConfig);
            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                log("¡Conexión establecida con éxito! El servidor aceptó la TV.");

                // 1. CONFIGURACIÓN DE RESOLUCIONES
                qualitySelect.disabled = false;
                qualitySelect.innerHTML = '<option value="-1">Automático (Recomendado)</option>';
                hls.levels.forEach((lvl, idx) => {
                    let opt = document.createElement('option');
                    opt.value = idx;
                    opt.text = lvl.name || `${lvl.height}p (${Math.round(lvl.bitrate / 1000)}kbps)`;
                    qualitySelect.appendChild(opt);
                });
                qualitySelect.addEventListener('change', (e) => {
                    log("Cambiando resolución a nivel: " + e.target.value);
                    hls.currentLevel = parseInt(e.target.value);
                });

                // 2. CONFIGURACIÓN DE AUDIOS
                if (hls.audioTracks.length > 1) {
                    audioSelect.disabled = false;
                    audioSelect.innerHTML = '';
                    hls.audioTracks.forEach((track, idx) => {
                        let opt = document.createElement('option');
                        opt.value = idx;
                        opt.text = track.name || `Idioma ${idx + 1}`;
                        if (idx === hls.audioTrack) opt.selected = true;
                        audioSelect.appendChild(opt);
                    });
                    audioSelect.addEventListener('change', (e) => {
                        log("Cambiando pista de audio a: " + e.target.value);
                        hls.audioTrack = parseInt(e.target.value);
                    });
                } else {
                    audioSelect.innerHTML = '<option>Audio Único Detectado</option>';
                }
            });

            // CONTROLADOR AVANZADO DE ERRORES EN PANTALLA
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    let httpStatus = (data.response && data.response.code) ? data.response.code : "CORS / Sin Respuesta";

                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            if (httpStatus === 403 || httpStatus === 404) {
                                log(`ERROR EN CONEXIÓN: El enlace m3u8 ha expirado en el servidor (HTTP ${httpStatus}).`, true);
                            } else {
                                log(`ERROR DE RED: Los segmentos de video (.ts) también requieren proxy o el token expiró.`, true);
                            }
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            log("ERROR DE MEDIOS: Formato incompatible. Intentando forzar decodificación...", true);
                            hls.recoverMediaError();
                            break;
                        default:
                            log(`ERROR FATAL: ${data.details}`, true);
                            hls.destroy();
                            break;
                    }
                }
            });

        } else {
            log("Hls.js no es compatible con este sistema. Intentando reproducción directa...", true);
            video.src = streamUrl;
        }
    </script>

</body>

</html>
