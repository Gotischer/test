<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor TV & Web (CORS Patch)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .player-container {
            max-width: 800px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            background: #000;
            border-radius: 8px;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        select {
            background: #222;
            color: #fff;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
        }

        #debugLog {
            margin-top: 20px;
            padding: 10px;
            background: #1a1a1a;
            color: #00ff00;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

    <div class="player-container">
        <h2>Fox 4K Player (Bypass CORS Activo)</h2>
        <video id="video" controls autoplay playsinline muted></video>

        <div class="controls">
            <div>
                <label>Calidad:</label><br>
                <select id="qualitySelect" disabled>
                    <option>Esperando señal...</option>
                </select>
            </div>
            <div>
                <label>Audio:</label><br>
                <select id="audioSelect" disabled>
                    <option>Esperando señal...</option>
                </select>
            </div>
        </div>

        <div id="debugLog">Iniciando sistema...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySelect = document.getElementById('qualitySelect');
        const audioSelect = document.getElementById('audioSelect');
        const debugLog = document.getElementById('debugLog');

        function log(msg, isError = false) {
            const color = isError ? "#ff4444" : "#00ff00";
            debugLog.innerHTML += `<br><span style="color: ${color}">> ${msg}</span>`;
        }

        // URL Original
        const urlOriginal = 'https://nl-081-v1.vivocdn.xyz/1781474995/c075a3b56e6144ef9ab2638dea205f34/qHwDja898rB6sB4eV3OmDdj4IfndP_vZIg7ezk8CVWw/fox4k-usa.m3u8';

        // Base del proxy para interceptar todo
        const proxyBase = 'https://api.allorigins.win/raw?url=';

        if (Hls.isSupported()) {
            log("Hls.js listo. Interceptando tráfico de red completo...");

            const hlsConfig = {
                enableWorker: true,
                maxBufferLength: 10,
                maxBufferSize: 15 * 1024 * 1024,

                // CONGELAMOS LAS PETICIONES: Forzamos a que TODO pase por el proxy
                xhrSetup: function (xhr, url) {
                    // Si la petición no lleva ya el proxy, se lo inyectamos a la fuerza
                    if (!url.startsWith(proxyBase)) {
                        const urlConProxy = proxyBase + encodeURIComponent(url);
                        xhr.open('GET', urlConProxy, true);
                    }
                }
            };

            const hls = new Hls(hlsConfig);
            hls.loadSource(proxyBase + encodeURIComponent(urlOriginal));
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                log("¡Manifiesto y fragmentos enlazados mediante Proxy con éxito!");

                // Configurar Calidades
                qualitySelect.disabled = false;
                qualitySelect.innerHTML = '<option value="-1">Automático</option>';
                hls.levels.forEach((lvl, idx) => {
                    let opt = document.createElement('option');
                    opt.value = idx;
                    opt.text = lvl.name || `${lvl.height}p`;
                    qualitySelect.appendChild(opt);
                });
                qualitySelect.addEventListener('change', (e) => {
                    hls.currentLevel = parseInt(e.target.value);
                });

                // Configurar Audios
                if (hls.audioTracks.length > 1) {
                    audioSelect.disabled = false;
                    audioSelect.innerHTML = '';
                    hls.audioTracks.forEach((track, idx) => {
                        let opt = document.createElement('option');
                        opt.value = idx;
                        opt.text = track.name || `Audio ${idx + 1}`;
                        if (idx === hls.audioTrack) opt.selected = true;
                        audioSelect.appendChild(opt);
                    });
                    audioSelect.addEventListener('change', (e) => {
                        hls.audioTrack = parseInt(e.target.value);
                    });
                }
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    log(`Error Fatal reincidente: ${data.details}. Verificando token...`, true);
                    hls.startLoad();
                }
            });

        } else {
            video.src = urlOriginal;
        }
    </script>

</body>

</html>
